name: Deployer
description: Atomically updates Helm values files for auto-deploy environments and opens PRs for gated environments, driven by matrix.config.yaml.
author: DND-IT

inputs:
  service:
    description: "Service name; must match a key under service: in the matrix config"
    required: true
  version:
    description: "Release version string (e.g. 1.4.0 or 2026.04.14)"
    required: true
  sha:
    description: "Short commit SHA; used when an environment has tag: sha"
    required: true
  token:
    description: "GitHub token with contents:write and pull-requests:write"
    required: true
  config:
    description: "Path to the matrix config file"
    required: false
    default: ".github/matrix.config.yaml"
  charts_dir:
    description: "Root directory for per-service Helm chart value overrides"
    required: false
    default: "deploy/charts"
  git_user_name:
    description: "Git commit author name"
    required: false
    default: "github-actions[bot]"
  git_user_email:
    description: "Git commit author email"
    required: false
    default: "github-actions[bot]@users.noreply.github.com"
  dry_run:
    description: "Print plan without pushing or creating PRs"
    required: false
    default: "false"

outputs:
  deployed:
    description: "'true' if at least one environment was updated"
  environments:
    description: "JSON array of environment names that were deployed"

runs:
  using: docker
  image: Dockerfile
  env:
    INPUT_SERVICE: ${{ inputs.service }}
    INPUT_VERSION: ${{ inputs.version }}
    INPUT_SHA: ${{ inputs.sha }}
    INPUT_TOKEN: ${{ inputs.token }}
    INPUT_CONFIG: ${{ inputs.config }}
    INPUT_CHARTS_DIR: ${{ inputs.charts_dir }}
    INPUT_GIT_USER_NAME: ${{ inputs.git_user_name }}
    INPUT_GIT_USER_EMAIL: ${{ inputs.git_user_email }}
    INPUT_DRY_RUN: ${{ inputs.dry_run }}
